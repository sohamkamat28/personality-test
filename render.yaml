services:
  - type: web
    name: personality-test
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_FILE_PATH
        value: /var/data/assessment-db.json
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: COOKIE_SECRET
        generateValue: true
    disk:
      name: assessment-data
      mountPath: /var/data
      sizeGB: 1
